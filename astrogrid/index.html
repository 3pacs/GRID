<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AstroGrid">
    <meta name="theme-color" content="#050810">
    <meta name="description" content="AstroGrid — Celestial Intelligence for market analysis">

    <title>AstroGrid — Celestial Intelligence</title>

    <!-- Google Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #050810;
            color: #C8D8E8;
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            height: 100%;
        }
        #root { height: 100%; }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(180deg, #050810 0%, #0A1628 100%);
            gap: 12px;
        }
        .loading-screen .title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #4A9EFF;
            letter-spacing: 6px;
        }
        .loading-screen .subtitle {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 12px;
            color: #5A7080;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <span class="title">ASTROGRID</span>
            <span class="subtitle">Celestial Intelligence</span>
        </div>
    </div>
    <script type="module" src="/astrogrid/src/main.jsx"></script>
</body>
</html>
